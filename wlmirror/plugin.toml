id           = "evergaster/wlmirror"
name         = "WL Mirror"
version      = "1.1.0"
plugin_api   = 3
author       = "evergaster"
license      = "MIT"
icon         = "cast"
description  = "Mirror Wayland outputs or windows using wl-mirror. Toggle from the bar widget with a dropdown panel."
tags         = ["screen"]
dependencies = ["wl-mirror"]

[[setting]]
key         = "output"
type        = "string"
label_key   = "settings.output.label"
description_key = "settings.output.description"
default     = ""

[[setting]]
key         = "extra_args"
type        = "string"
label_key   = "settings.extra_args.label"
description_key = "settings.extra_args.description"
default     = ""

[[widget]]
id    = "mirror"
entry = "toggle.luau"

[[panel]]
id    = "panel"
entry = "panel.luau"
width = 420
height = 350
placement = "attached"
open_near_click = true

[[service]]
id    = "monitor"
entry = "monitor.luau"
