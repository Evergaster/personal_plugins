id           = "evergaster/wlmirror"
name         = "WL Mirror"
version      = "1.0.2"
plugin_api   = 3
author       = "evergaster"
license      = "MIT"
icon         = "cast"
description  = "Prende/apaga wl-mirror para espejear un output desde el control center."
tags         = ["screen"]
dependencies = ["wl-mirror"]

[[setting]]
key         = "output"
type        = "string"
label_key   = "settings.output.label"
description_key = "settings.output.description"
default     = ""

[[setting]]
key         = "extra_args"
type        = "string"
label_key   = "settings.extra_args.label"
description_key = "settings.extra_args.description"
default     = ""

[[shortcut]]
id    = "toggle"
entry = "toggle.luau"

[[service]]
id    = "monitor"
entry = "monitor.luau"
